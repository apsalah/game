<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>약국 미니게임 - 약리학 MCQ 대화체</title>
  <style>
    :root {
      --stage-max-width: 1400px;

      /* 손님 캐릭터 위치: 사용자가 조절한 기준값 */
      --customer-width: 22.8%;
      --customer-right: 14.2%;
      --desk-top-y: 62.3%;
      --crop-height-ratio: 1024 / 1295;

      /* 말풍선 글상자 위치: 사용자가 조절한 기준값 */
      --speech-left: 21.0%;
      --speech-top: 17.8%;
      --speech-width: 35.0%;
      --speech-height: 14.8%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #eef7ff, #f8edd9);
      font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      padding: 20px;
      color: #4f3829;
    }

    .wrap {
      width: min(96vw, calc((100dvh - 40px) * 1672 / 941));
      container-type: inline-size;
    }

    .stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1672 / 941;
      overflow: hidden;
      border-radius: 24px;
      box-shadow: 0 24px 56px rgba(63, 44, 28, 0.18);
      background: #f6efe5;
      user-select: none;
    }

    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .customer-crop {
      position: absolute;
      right: var(--customer-right);
      bottom: calc(100% - var(--desk-top-y));
      width: var(--customer-width);
      aspect-ratio: var(--crop-height-ratio);
      overflow: hidden;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      pointer-events: none;
    }

    .customer-crop img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,0.08));
    }

    .speech-text {
      position: absolute;
      left: var(--speech-left);
      top: var(--speech-top);
      width: var(--speech-width);
      height: var(--speech-height);
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.72% 1.15%;
      text-align: center;
      font-weight: 900;
      font-size: clamp(7px, 1.45cqw, 30px);
      line-height: 1.16;
      color: #5a3a29;
      word-break: normal;
      overflow-wrap: anywhere;
      white-space: pre-line;
      pointer-events: none;
      text-shadow: 0 1px 0 rgba(255,255,255,0.55);
      overflow: hidden;
    }

    .speech-text-inner {
      display: block;
      width: 100%;
      max-width: 100%;
      line-height: 1.16;
      transform-origin: center center;
      will-change: transform, font-size;
      white-space: pre-line;
      word-break: normal;
      overflow-wrap: anywhere;
    }

    .med-name {
      position: absolute;
      z-index: 19;
      height: 5.3%;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 1000;
      font-size: clamp(9px, 1.12vw, 21px);
      color: #3f2a1d;
      pointer-events: none;
      letter-spacing: -0.055em;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.86),
        0 0 4px rgba(255,247,229,0.90),
        0 1px 2px rgba(57,35,20,0.22);
      padding: 0 0.18%;
      white-space: nowrap;
      overflow: visible;
      text-rendering: geometricPrecision;
      -webkit-font-smoothing: antialiased;
    }

    .med-name-inner {
      display: inline-block;
      max-width: none;
      white-space: nowrap;
      line-height: 1.02;
      transform-origin: center center;
      will-change: transform, font-size;
    }

    /* 약 이름 위치: 사용자가 조절한 기준값 */
    .med-name[data-med="cough"] { left: 22.44%; top: 78.3%; width: 9.72%; }
    .med-name[data-med="pain"] { left: 35.445%; top: 78.3%; width: 9.81%; }
    .med-name[data-med="stomach"] { left: 48.645%; top: 78.3%; width: 9.81%; }
    .med-name[data-med="allergy"] { left: 62.075%; top: 78.3%; width: 10.35%; }
    .med-name[data-med="cold"] { left: 76.25%; top: 78.3%; width: 9.90%; }

    .hit {
      position: absolute;
      z-index: 25;
      border: 0;
      background: rgba(255,255,255,0);
      cursor: pointer;
      border-radius: 12px;
      padding: 0;
      outline: none;
    }

    .hit:hover,
    .hit:active,
    .hit:focus,
    .hit:focus-visible {
      background: rgba(255,255,255,0);
      box-shadow: none;
      outline: none;
    }

    /* 클릭 영역 위치: 사용자가 조절한 기준값 */
    .hit[data-med="cough"]   { left: 25.0%; top: 61.2%; width: 5.6%; height: 15.5%; }
    .hit[data-med="pain"]    { left: 37.8%; top: 61.2%; width: 5.6%; height: 15.5%; }
    .hit[data-med="stomach"] { left: 50.8%; top: 61.2%; width: 5.6%; height: 15.5%; }
    .hit[data-med="allergy"] { left: 64.6%; top: 61.2%; width: 5.6%; height: 15.5%; }
    .hit[data-med="cold"]    { left: 78.0%; top: 61.2%; width: 5.6%; height: 15.5%; }

    .judge {
      position: absolute;
      z-index: 40;
      right: 12%;
      top: 20%;
      width: clamp(38px, 8.8cqw, 132px);
      height: clamp(38px, 8.8cqw, 132px);
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      transform: scale(0.9);
      animation: pop 0.22s ease forwards;
      filter: drop-shadow(0 clamp(4px, 0.85cqw, 12px) clamp(8px, 1.45cqw, 20px) rgba(58, 39, 24, 0.18));
    }

    .judge.show { display: flex; }

    .judge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      pointer-events: none;
    }

@keyframes pop {
      from { opacity: 0; transform: scale(0.78); }
      to { opacity: 1; transform: scale(1); }
    }

    .top-ui {
      position: absolute;
      left: 1.2%;
      top: 1.4%;
      z-index: 35;
      display: flex;
      gap: clamp(4px, 0.72cqw, 10px);
      align-items: center;
    }

    .ui-card {
      background: rgba(255,255,255,0.82);
      backdrop-filter: blur(8px);
      border-radius: clamp(9px, 1.15cqw, 16px);
      box-shadow: 0 clamp(4px, 0.58cqw, 8px) clamp(8px, 1.15cqw, 16px) rgba(68,43,28,0.14);
      padding: clamp(5px, 0.72cqw, 10px) clamp(7px, 1.0cqw, 14px);
      font-weight: 900;
      color: #563b2a;
      font-size: clamp(9px, 1.0cqw, 16px);
    }

    .nav-controls {
      position: absolute;
      right: 2.0%;
      bottom: 2.2%;
      z-index: 42;
      display: flex;
      gap: clamp(5px, 0.86cqw, 12px);
      align-items: center;
    }

    .circle-btn {
      width: clamp(34px, 5.2cqw, 78px);
      height: clamp(34px, 5.2cqw, 78px);
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.88);
      box-shadow: 0 clamp(4px, 0.72cqw, 10px) clamp(9px, 1.58cqw, 22px) rgba(68,43,28,0.20);
      color: #563b2a;
      font-weight: 1000;
      font-size: clamp(18px, 3.0cqw, 42px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s ease, background 0.14s ease;
    }

    .circle-btn:hover {
      transform: translateY(clamp(-3px, -0.22cqw, -1px));
      background: rgba(255,255,255,0.98);
    }

    .next-btn { color: #2f7f62; }

    .restart {
      border: 0;
      background: rgba(255,255,255,0.86);
      border-radius: clamp(9px, 1.15cqw, 16px);
      box-shadow: 0 clamp(4px, 0.58cqw, 8px) clamp(8px, 1.15cqw, 16px) rgba(68,43,28,0.14);
      padding: clamp(5px, 0.72cqw, 10px) clamp(7px, 1.0cqw, 14px);
      font-weight: 900;
      color: #563b2a;
      cursor: pointer;
      font-size: clamp(9px, 1.0cqw, 16px);
    }

    .restart:hover { background: rgba(255,255,255,0.96); }

    .popup-overlay {
      position: absolute;
      inset: 0;
      z-index: 70;
      display: none;
      align-items: center;
      justify-content: center;
      padding: clamp(5px, 1.4cqw, 42px);
      background: rgba(54, 35, 24, 0.34);
      backdrop-filter: blur(4px);
    }

    .popup-overlay.show { display: flex; }

    .popup-card {
      width: min(760px, 82cqw, 92vw);
      max-height: calc(100% - clamp(10px, 2.8cqw, 60px));
      overflow: auto;
      background: rgba(255,255,255,0.96);
      border-radius: clamp(12px, 1.9cqw, 26px);
      box-shadow: 0 clamp(8px, 1.45cqw, 20px) clamp(18px, 3.6cqw, 50px) rgba(54,35,24,0.28);
      padding: clamp(8px, 1.85cqw, 26px) clamp(9px, 2.0cqw, 28px);
      color: #4f3829;
      font-size: clamp(10px, 1.05cqw, 16px);
      scrollbar-width: thin;
    }

    .popup-head {
      display: flex;
      justify-content: space-between;
      gap: clamp(6px, 1.15cqw, 16px);
      align-items: flex-start;
      margin-bottom: clamp(5px, 1.0cqw, 14px);
    }

    .popup-title {
      font-size: clamp(14px, 1.72cqw, 24px);
      font-weight: 1000;
      line-height: 1.25;
    }

    .popup-source {
      color: #846858;
      font-size: clamp(9px, 0.95cqw, 14px);
      font-weight: 800;
      margin-top: clamp(2px, 0.45cqw, 6px);
    }

    .close-btn {
      border: 0;
      border-radius: clamp(7px, 0.86cqw, 12px);
      background: #f2e6da;
      color: #563b2a;
      font-weight: 1000;
      font-size: clamp(13px, 1.43cqw, 20px);
      width: clamp(24px, 2.86cqw, 40px);
      height: clamp(24px, 2.86cqw, 40px);
      cursor: pointer;
      flex: 0 0 auto;
    }

    .popup-question {
      margin: clamp(6px, 1.15cqw, 16px) 0;
      padding: clamp(6px, 1.0cqw, 14px) clamp(7px, 1.15cqw, 16px);
      background: #fff4e7;
      border-radius: clamp(8px, 1.15cqw, 16px);
      font-weight: 850;
      line-height: 1.45;
      font-size: clamp(10px, 1.05cqw, 16px);
    }

    .core-line {
      margin: clamp(5px, 0.86cqw, 12px) 0 clamp(6px, 1.0cqw, 14px);
      padding: clamp(6px, 0.86cqw, 12px) clamp(7px, 1.0cqw, 14px);
      background: #eff8ef;
      border-radius: clamp(8px, 1.0cqw, 14px);
      font-weight: 800;
      line-height: 1.45;
      color: #346341;
      font-size: clamp(10px, 1.0cqw, 15px);
    }

    .answer-line {
      margin: clamp(5px, 0.86cqw, 12px) 0 clamp(6px, 1.15cqw, 16px);
      font-weight: 1000;
      color: #16805c;
      font-size: clamp(11px, 1.28cqw, 18px);
    }

    .explanation-list {
      display: grid;
      gap: clamp(4px, 0.58cqw, 8px);
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .explanation-list li {
      padding: clamp(5px, 0.72cqw, 10px) clamp(6px, 0.86cqw, 12px);
      background: #f8f2eb;
      border-radius: clamp(7px, 0.86cqw, 12px);
      line-height: 1.43;
      font-weight: 650;
      font-size: clamp(9.5px, 1.0cqw, 15px);
    }

    .end-panel {
      position: absolute;
      inset: 0;
      z-index: 80;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(54, 35, 24, 0.34);
      backdrop-filter: blur(4px);
    }

    .end-panel.show { display: flex; }

    .end-card {
      width: min(460px, 88vw);
      background: rgba(255,255,255,0.96);
      border-radius: 28px;
      padding: 30px 24px;
      box-shadow: 0 20px 50px rgba(54,35,24,0.28);
      text-align: center;
    }

    .end-card h2 {
      margin: 0 0 10px;
      font-size: 32px;
      color: #4f3829;
    }

    .end-card p {
      margin: 8px 0;
      color: #735a49;
      font-weight: 700;
      line-height: 1.55;
    }

    .final-score {
      margin: 14px 0 18px;
      font-size: 52px;
      font-weight: 1000;
      color: #249a67;
    }



    @media (max-width: 520px) {
      .speech-text {
        padding: 0.48% 0.78%;
        line-height: 1.08;
      }
      .speech-text-inner {
        line-height: 1.08;
      }
    }

    @media (max-width: 900px) {
      body { padding: 0; }
      .wrap { width: min(100vw, calc(100dvh * 1672 / 941)); }
      .stage { border-radius: 0; }
      .top-ui { transform: none; }
      .nav-controls { transform: none; }
      .popup-card {
        width: min(92cqw, 94vw);
        max-height: calc(100% - 10px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="stage" id="stage">
      <img class="bg" src="image/background.png" alt="약국 배경" />

      <div class="top-ui">
        <div class="ui-card">점수 <span id="score">0</span> / <span id="total">100</span></div>
        <div class="ui-card">문제 <span id="round">1</span> / <span id="totalRound">100</span></div>
        <button class="restart" id="restartTop">다시 시작</button>
      </div>

      <div class="customer-crop" aria-hidden="true">
        <img id="customerImg" src="image/customers/customer_00.png" alt="손님 캐릭터" />
      </div>

      <div class="speech-text" id="speechText"></div>

      <div class="med-name" data-med="cough" id="label0"></div>
      <div class="med-name" data-med="pain" id="label1"></div>
      <div class="med-name" data-med="stomach" id="label2"></div>
      <div class="med-name" data-med="allergy" id="label3"></div>
      <div class="med-name" data-med="cold" id="label4"></div>

      <button class="hit" data-med="cough" data-slot="0" aria-label="1번 약"></button>
      <button class="hit" data-med="pain" data-slot="1" aria-label="2번 약"></button>
      <button class="hit" data-med="stomach" data-slot="2" aria-label="3번 약"></button>
      <button class="hit" data-med="allergy" data-slot="3" aria-label="4번 약"></button>
      <button class="hit" data-med="cold" data-slot="4" aria-label="5번 약"></button>

      <div class="judge" id="judge"><img id="judgeImg" alt="정오 표시" /></div>

      <div class="nav-controls">
        <button class="circle-btn help-btn" id="helpBtn" aria-label="해설 보기">?</button>
        <button class="circle-btn next-btn" id="nextBtn" aria-label="다음 문제">➜</button>
      </div>

      <div class="popup-overlay" id="explainPopup">
        <div class="popup-card">
          <div class="popup-head">
            <div>
              <div class="popup-title" id="popupTitle">해설</div>
              <div class="popup-source" id="popupSource"></div>
            </div>
            <button class="close-btn" id="closePopup" aria-label="닫기">×</button>
          </div>
          <div class="popup-question" id="popupQuestion"></div>
          <div class="core-line" id="popupCore"></div>
          <div class="answer-line" id="popupAnswer"></div>
          <ul class="explanation-list" id="popupExplanation"></ul>
        </div>
      </div>

      <div class="end-panel" id="endPanel">
        <div class="end-card">
          <h2>게임 종료</h2>
          <p>Word 파일의 문제를 모두 풀었습니다.</p>
          <div class="final-score"><span id="finalScore">0</span> / <span id="finalTotal">100</span></div>
          <button class="restart" id="restartBottom" style="font-size:18px;padding:14px 22px;">다시 시작</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const QUESTIONS = [
  {
    "number": 1,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"음주 후 acetaldehyde가 쌓이게 만들어 금주를 돕는 약을 주세요.\"",
    "dialogue": "음주 후 acetaldehyde가 쌓이게 만들어 금주를 돕는 약을 주세요.",
    "correctCandidates": [
      "Disulfiram"
    ],
    "wrongCandidates": [
      "Naltrexone",
      "Acamprosate",
      "Topiramate",
      "Fomepizole",
      "Ondansetron",
      "Phenelzine"
    ],
    "baseExplanation": "Disulfiram은 ALDH를 억제해 acetaldehyde 축적을 유도하므로 음주 시 불쾌반응이 생긴다."
  },
  {
    "number": 2,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"Alcohol dehydrogenase를 경쟁적으로 억제하는 약을 주세요.\"",
    "dialogue": "Alcohol dehydrogenase를 경쟁적으로 억제하는 약을 주세요.",
    "correctCandidates": [
      "Fomepizole"
    ],
    "wrongCandidates": [
      "Disulfiram",
      "Naltrexone",
      "Acamprosate",
      "Topiramate",
      "Cimetidine",
      "Aspirin"
    ],
    "baseExplanation": "Fomepizole은 alcohol dehydrogenase를 경쟁적으로 억제해 methanol·ethylene glycol의 독성 대사산물 생성을 줄인다. Antidiuretic hormone(ADH) 길항제와 구분해야 한다."
  },
  {
    "number": 3,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"mu-opioid receptor antagonist로 금주 유지에 도움 되는 약을 주세요.\"",
    "dialogue": "mu-opioid receptor antagonist로 금주 유지에 도움 되는 약을 주세요.",
    "correctCandidates": [
      "Naltrexone"
    ],
    "wrongCandidates": [
      "Disulfiram",
      "Acamprosate",
      "Topiramate",
      "Fomepizole",
      "Tramadol",
      "Bromocriptine"
    ],
    "baseExplanation": "Naltrexone은 mu-opioid receptor antagonist로 알코올 craving 감소에 사용된다."
  },
  {
    "number": 4,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"금주 유지에 쓰이며 glutamatergic 신경전달을 안정화하는 약을 주세요.\"",
    "dialogue": "금주 유지에 쓰이며 glutamatergic 신경전달을 안정화하는 약을 주세요.",
    "correctCandidates": [
      "Acamprosate"
    ],
    "wrongCandidates": [
      "Naltrexone",
      "Disulfiram",
      "Fomepizole",
      "Zileuton",
      "Montelukast"
    ],
    "baseExplanation": "Acamprosate의 정확한 기전은 완전히 확립되지 않았지만, alcohol dependence에서 과활성화된 glutamatergic/NMDA 관련 신경전달을 조절해 금주 유지에 도움을 준다."
  },
  {
    "number": 5,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"전압의존성 Na+ channel을 차단하는 금주 보조약을 주세요.\"",
    "dialogue": "전압의존성 Na+ channel을 차단하는 금주 보조약을 주세요.",
    "correctCandidates": [
      "Topiramate"
    ],
    "wrongCandidates": [
      "Acamprosate",
      "Naltrexone",
      "Disulfiram",
      "Fomepizole",
      "Celecoxib",
      "Venlafaxine"
    ],
    "baseExplanation": "Topiramate는 전압의존성 Na+ channel 차단과 체중감소 특징이 정리본에 제시되어 있다."
  },
  {
    "number": 6,
    "source": "약물 게임 제작용 자료: 54-58강",
    "question": "환자 대사: \"직접 renin inhibitor를 주세요.\"",
    "dialogue": "직접 renin inhibitor를 주세요.",
    "correctCandidates": [
      "Aliskiren"
    ],
    "wrongCandidates": [
      "Captopril",
      "Enalapril",
      "Lisinopril",
      "Ramipril",
      "Trandolapril",
      "Candesartan",
      "Losartan",

    const totalRounds = QUESTIONS.length;
    const CORRECT_ICON = "image/correct_icon.png";
    const WRONG_ICON = "image/wrong_icon.png";
    const CUSTOMER_IMAGES = [
      "image/customers/customer_00.png",
      "image/customers/customer_01.png",
      "image/customers/customer_02.png",
      "image/customers/customer_03.png",
      "image/customers/customer_04.png",
      "image/customers/customer_05.png",
      "image/customers/customer_06.png",
      "image/customers/customer_07.png",
      "image/customers/customer_08.png",
      "image/customers/customer_09.png"
    ];

    const stage = document.getElementById("stage");
    const scoreEl = document.getElementById("score");
    const roundEl = document.getElementById("round");
    const totalEl = document.getElementById("total");
    const totalRoundEl = document.getElementById("totalRound");
    const finalTotalEl = document.getElementById("finalTotal");
    const speechText = document.getElementById("speechText");
    const judge = document.getElementById("judge");
    const customerImg = document.getElementById("customerImg");
    const judgeImg = document.getElementById("judgeImg");
    const endPanel = document.getElementById("endPanel");
    const finalScore = document.getElementById("finalScore");
    const hitButtons = Array.from(document.querySelectorAll(".hit"));
    const labelEls = [
      document.getElementById("label0"),
      document.getElementById("label1"),
      document.getElementById("label2"),
      document.getElementById("label3"),
      document.getElementById("label4")
    ];

    const helpBtn = document.getElementById("helpBtn");
    const nextBtn = document.getElementById("nextBtn");
    const explainPopup = document.getElementById("explainPopup");
    const closePopup = document.getElementById("closePopup");
    const popupTitle = document.getElementById("popupTitle");
    const popupSource = document.getElementById("popupSource");
    const popupQuestion = document.getElementById("popupQuestion");
    const popupCore = document.getElementById("popupCore");
    const popupAnswer = document.getElementById("popupAnswer");
    const popupExplanation = document.getElementById("popupExplanation");

    let gameList = [];
    let currentIndex = 0;
    let score = 0;
    let locked = false;
    let currentOptions = [];
    let currentRound = null;
    let answered = new Set();
    let lastCustomerIndex = -1;

    const speechSpan = document.createElement("span");
    speechSpan.className = "speech-text-inner";
    speechText.appendChild(speechSpan);

    const labelSpans = labelEls.map(label => {
      const span = document.createElement("span");
      span.className = "med-name-inner";
      label.appendChild(span);
      return span;
    });

    totalEl.textContent = totalRounds;
    totalRoundEl.textContent = totalRounds;
    if (finalTotalEl) finalTotalEl.textContent = totalRounds;

    function shuffle(array) {
      const copy = [...array];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function uniqueList(array) {
      const result = [];
      const seen = new Set();
      array.forEach(item => {
        if (item && !seen.has(item)) {
          seen.add(item);
          result.push(item);
        }
      });
      return result;
    }

    function pickOne(array) {
      const clean = uniqueList(array);
      return clean[Math.floor(Math.random() * clean.length)];
    }

    function pickWrongOptions(question, answer, count) {
      const blocked = new Set([answer, ...question.correctCandidates]);
      let wrongs = shuffle(uniqueList(question.wrongCandidates).filter(drug => !blocked.has(drug))).slice(0, count);

      if (wrongs.length < count) {
        const fallback = shuffle(Object.keys(DRUG_INFO).filter(drug => !blocked.has(drug) && !wrongs.includes(drug)));
        wrongs = wrongs.concat(fallback.slice(0, count - wrongs.length));
      }

      return wrongs;
    }

    function buildRound(question) {
      const answer = pickOne(question.correctCandidates);
      const wrongs = pickWrongOptions(question, answer, 4);
      const options = shuffle([answer, ...wrongs]);
      return { ...question, answer, options };
    }

    function setButtonsEnabled(enabled) {
      hitButtons.forEach(btn => btn.disabled = !enabled);
    }

    function showJudge(type) {
      judge.className = "judge show";
      if (type === "correct") {
        judgeImg.src = CORRECT_ICON;
        judgeImg.alt = "정답";
      } else {
        judgeImg.src = WRONG_ICON;
        judgeImg.alt = "오답";
      }
    }

    function hideJudge() {
      judge.className = "judge";
      judgeImg.removeAttribute("src");
      judgeImg.alt = "";
    }

    function pickRandomCustomer() {
      if (CUSTOMER_IMAGES.length === 0) return "image/customers/customer_00.png";
      let idx = Math.floor(Math.random() * CUSTOMER_IMAGES.length);
      if (CUSTOMER_IMAGES.length > 1 && idx === lastCustomerIndex) {
        idx = (idx + 1 + Math.floor(Math.random() * (CUSTOMER_IMAGES.length - 1))) % CUSTOMER_IMAGES.length;
      }
      lastCustomerIndex = idx;
      return CUSTOMER_IMAGES[idx];
    }

    function fitTextToBox(box, span, maxSize, minSize) {
      if (!box || !span) return;

      span.style.fontSize = maxSize + "px";
      span.style.lineHeight = "1.16";
      span.style.transform = "none";

      const availableWidth = Math.max(1, box.clientWidth - 2);
      const availableHeight = Math.max(1, box.clientHeight - 2);
      const fits = () => span.scrollWidth <= availableWidth + 1 && span.scrollHeight <= availableHeight + 1;

      let low = minSize;
      let high = maxSize;
      for (let i = 0; i < 14; i++) {
        const mid = (low + high) / 2;
        span.style.fontSize = mid + "px";
        if (fits()) low = mid;
        else high = mid;
      }
      span.style.fontSize = low + "px";

      if (!fits()) {
        const scaleX = availableWidth / Math.max(1, span.scrollWidth);
        const scaleY = availableHeight / Math.max(1, span.scrollHeight);
        const scale = Math.min(1, scaleX, scaleY);
        span.style.transform = `scale(${scale})`;
      }
    }

    function fitLabelText(label, span, maxSize, minSize) {
      if (!label || !span) return;
      span.style.fontSize = maxSize + "px";
      span.style.transform = "none";

      let size = maxSize;
      const fits = () => span.scrollWidth <= label.clientWidth + 1 && span.scrollHeight <= label.clientHeight + 1;

      while (size > minSize && !fits()) {
        size -= 0.5;
        span.style.fontSize = size + "px";
      }

      if (!fits()) {
        const availableWidth = Math.max(1, label.clientWidth - 2);
        const scaleX = Math.min(1, availableWidth / Math.max(1, span.scrollWidth));
        span.style.transform = `scaleX(${scaleX})`;
      }
    }

    function fitAllText() {
      const stageWidth = stage.clientWidth || 1400;

      const speechMax = Math.min(30, Math.max(11, stageWidth * 0.0195));
      const speechMin = stageWidth < 430 ? 4.8 : stageWidth < 700 ? 6.2 : 8;
      fitTextToBox(speechText, speechSpan, speechMax, speechMin);

      labelEls.forEach((label, idx) => {
        const span = labelSpans[idx];
        const labelMax = Math.min(22, Math.max(9, stageWidth * 0.0145));
        const labelMin = stageWidth < 520 ? 6 : 7.5;
        fitLabelText(label, span, labelMax, labelMin);
      });
    }

    function loadRound() {
      const baseQuestion = gameList[currentIndex];
      currentRound = buildRound(baseQuestion);
      currentOptions = [...currentRound.options];
      customerImg.src = pickRandomCustomer();

      speechSpan.textContent = currentRound.dialogue || currentRound.question;
      roundEl.textContent = currentIndex + 1;

      currentOptions.forEach((option, idx) => {
        labelSpans[idx].textContent = option;
        labelEls[idx].title = option;
        hitButtons[idx].setAttribute("aria-label", option);
      });

      locked = answered.has(currentRound.number);
      hideJudge();
      setButtonsEnabled(!locked);

      requestAnimationFrame(() => {
        fitAllText();
        requestAnimationFrame(fitAllText);
      });
    }

    function nextRound() {
      currentIndex += 1;
      if (currentIndex >= totalRounds) {
        finalScore.textContent = score;
        if (finalTotalEl) finalTotalEl.textContent = totalRounds;
        endPanel.classList.add("show");
        setButtonsEnabled(false);
        return;
      }
      loadRound();
    }

    function selectMedicine(slotIndex) {
      if (locked || !currentRound) return;

      const picked = currentOptions[slotIndex];

      if (picked === currentRound.answer) {
        locked = true;
        answered.add(currentRound.number);
        score += 1;
        scoreEl.textContent = score;
        showJudge("correct");
        setButtonsEnabled(false);
      } else {
        showJudge("wrong");
      }
    }

    function getOptionExplanation(option, displayIndex, current) {
      const circledNumbers = ["①", "②", "③", "④", "⑤"];
      const numberMark = circledNumbers[displayIndex] || `${displayIndex + 1}.`;
      const judgement = option === current.answer ? "정답" : "오답";
      const desc = DRUG_INFO[option] || "Word 파일의 약물 설명 표에서 설명을 찾지 못했습니다.";
      return `${numberMark} ${option} / ${judgement} / ${desc}`;
    }

    function openExplanation() {
      const current = currentRound;
      if (!current) return;

      popupTitle.textContent = `문항 ${current.number} 해설`;
      popupSource.textContent = "";
      popupQuestion.textContent = current.question;
      popupCore.textContent = current.baseExplanation ? `문제 해설: ${current.baseExplanation}` : "";
      popupCore.style.display = current.baseExplanation ? "block" : "none";
      popupAnswer.textContent = `이번 정답: ${current.answer}`;
      popupExplanation.innerHTML = "";

      currentOptions.forEach((option, displayIndex) => {
        const li = document.createElement("li");
        li.textContent = getOptionExplanation(option, displayIndex, current);
        popupExplanation.appendChild(li);
      });

      explainPopup.classList.add("show");
    }

    function closeExplanation() {
      explainPopup.classList.remove("show");
    }

    function startGame() {
      gameList = shuffle(QUESTIONS);
      currentIndex = 0;
      score = 0;
      locked = false;
      currentRound = null;
      answered = new Set();
      scoreEl.textContent = "0";
      totalEl.textContent = totalRounds;
      totalRoundEl.textContent = totalRounds;
      if (finalTotalEl) finalTotalEl.textContent = totalRounds;
      endPanel.classList.remove("show");
      closeExplanation();
      loadRound();
    }

    hitButtons.forEach(btn => {
      btn.addEventListener("click", () => selectMedicine(Number(btn.dataset.slot)));
    });

    helpBtn.addEventListener("click", openExplanation);
    nextBtn.addEventListener("click", nextRound);
    closePopup.addEventListener("click", closeExplanation);

    explainPopup.addEventListener("click", (event) => {
      if (event.target === explainPopup) closeExplanation();
    });

    window.addEventListener("resize", fitAllText);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeExplanation();
      if (event.key === "ArrowRight" && !explainPopup.classList.contains("show")) nextRound();
    });

    document.getElementById("restartTop").addEventListener("click", startGame);
    document.getElementById("restartBottom").addEventListener("click", startGame);

    startGame();
  </script>
</body>
